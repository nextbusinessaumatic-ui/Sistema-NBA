<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mapa Interativo</title>

<style>
body {
    margin: 0;
    background: #2c5364;
    font-family: Arial;
}

/* CONTAINER */
.mapa {
    position: relative;
    width: 80%;
    max-width: 735px;
    margin: auto;
    z-index: 1;
}

.planta {
    position: relative;
    width: 100%;
    z-index: 1;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0.5;
    width: 100%;
    opacity: 0;
    pointer-events: none;
    z-index: 2;
}

.area {
    position: absolute;
    cursor: pointer;
    z-index: 3;
}

.area:hover {
    border: 2px solid cyan;
    background: rgba(0,255,255,0.2);
}

.chatbot-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 15px 25px;
    border: none;
    border-radius: 50px;
    background: #00c6ff;
    color: white;
    font-size: 16px;
    cursor: pointer;
    z-index: 9999;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.chatbot-btn:hover {
    background: #0099cc;
    transform: scale(1.05);
}

/* POSIÇÕES (AGORA VÃO BATER COM A IMAGEM COLORIDA) */

.secretaria { top: 40%; left: 10%; width: 28%; height: 15%; }
.biblioteca { top: 20%; left: 40%; width: 18%; height: 25%; }
.central { top: 60%; left: 12%; width: 22%; height: 12%; }
.tesouraria { top: 75%; left: 15%; width: 15%; height: 10%; }

.gabinete { top: 55%; left: 35%; width: 30%; height: 10%; }

.ti { top: 75%; left: 45%; width: 15%; height: 10%; }

.sala001 { top: 60%; left: 65%; width: 18%; height: 18%; }
.sala002 { top: 30%; left: 70%; width: 12%; height: 18%; }
.refeitorio { top: 30%; left: 58%; width: 12%; height: 18%; }
.atletica { top: 60%; left: 82%; width: 15%; height: 18%; }
.npj { top: 85%; left: 85%; width: 15%; height: 12%; }
.descanso { top: 10%; left: 70%; width: 20%; height: 15%; }

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999; /* Adicione isso */
}

.hidden {
    display: none;
}

.modal-content {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    text-align: center;

    z-index: 10000; /* Adicione isso */
}
</style>
</head>

<body>

<a href="/chat">
    <button class="chatbot-btn">
        🤖 Ir para o ChatBot
    </button>
</a>

<div class="mapa">

    <!-- IMAGEM BASE -->
    <img src="/static/planta.png" class="planta">

    <!-- IMAGEM DE CORES (ALINHADA) -->
    <img src="/static/cores.png" class="overlay">

    <!-- ÁREAS -->
    <div class="area secretaria" onclick="abrirModal('secretaria')"></div>
    <div class="area biblioteca" onclick="abrirModal('biblioteca')"></div>
    <div class="area central" onclick="abrirModal('central')"></div>
    <div class="area tesouraria" onclick="abrirModal('tesouraria')"></div>
    <div class="area gabinete" onclick="abrirModal('gabinete')"></div>
    <div class="area ti" onclick="abrirModal('ti')"></div>
    <div class="area sala001" onclick="abrirModal('sala001')"></div>
    <div class="area sala002" onclick="abrirModal('sala002')"></div>
    <div class="area refeitorio" onclick="abrirModal('refeitorio')"></div>
    <div class="area atletica" onclick="abrirModal('atletica')"></div>
    <div class="area npj" onclick="abrirModal('npj')"></div>
    <div class="area descanso" onclick="abrirModal('descanso')"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
    <div class="modal-content">
        <h2 id="titulo"></h2>
        <p id="descricao"></p>
        <button onclick="fecharModal()">Fechar</button>
    </div>
</div>

<script>
function abrirModal(local) {

    const dados = {
        secretaria: ["Secretaria", "Atendimento ao aluno"],
        biblioteca: ["Biblioteca", "Estudos"],
        central: ["Central de Estágio", "Suporte estágio"],
        tesouraria: ["Tesouraria", "Financeiro"],
        ti: ["T.I", "Suporte técnico"],
        sala001: ["Sala 001", "Aulas"],
        sala002: ["Sala 002", "Aulas"],
        refeitorio: ["Refeitório", "Alimentação"],
        atletica: ["Atlética", "Eventos"],
        npj: ["NPJ", "Jurídico"],
        descanso: ["Descanso", "Relaxamento"],
        gabinete: ["Gabinete", "Professores"]
    };

    document.getElementById("titulo").innerText = dados[local][0];
    document.getElementById("descricao").innerText = dados[local][1];

    document.getElementById("modal").classList.remove("hidden");
}

function fecharModal() {
    document.getElementById("modal").classList.add("hidden");
}
</script>

</body>
</html>
